<style>
.mode-landscape .sl-layout { flex-direction: row; }
.mode-portrait .sl-layout { flex-direction: column; }
.mode-portrait .sl-visual { width: 100%; height: 40%; }
.mode-portrait .sl-content { width: 100%; }
</style>

<section class="w-full h-full overflow-hidden bg-white">
  <div class="sl-layout flex w-full h-full">
    <!-- Left: content column -->
    <div class="sl-content flex flex-col justify-between p-10" style="flex: 1.5;">
      <!-- Top badge -->
      <div class="flex items-center gap-3">
        <img src="{{config.logoUrl}}" alt="logo" class="w-8 h-8 rounded-lg object-contain" />
        <span class="text-xs font-semibold uppercase tracking-widest px-3 py-1 rounded-full"
          style="background-color: {{config.brandColor.muted}}; color: {{config.brandColor.foreground}}; font-family: '{{config.font.textFont}}', sans-serif;">
          Mandarin Learning Platform
        </span>
      </div>

      <!-- Headline block -->
      <div class="flex flex-col gap-4">
        <h1 class="text-5xl font-bold leading-tight"
          style="color: {{config.brandColor.foreground}}; font-family: '{{config.font.headingFont}}', sans-serif;">
          Master Mandarin.<br/>One Card at a Time.
        </h1>
        <p class="text-lg leading-relaxed"
          style="color: {{config.brandColor.mutedForeground}}; font-family: '{{config.font.textFont}}', sans-serif; max-width: 420px;">
          Structured HSK flashcards with native audio and daily streaks — every level from HSK 1 to HSK 6.
        </p>
        <!-- Chips -->
        <div class="flex flex-wrap gap-2 mt-1">
          <span class="px-3 py-1 rounded-full text-sm font-semibold"
            style="background-color: {{config.brandColor.primary}}; color: {{config.brandColor.primaryForeground}}; font-family: '{{config.font.textFont}}', sans-serif;">
            🔊 Native Audio
          </span>
          <span class="px-3 py-1 rounded-full text-sm font-semibold"
            style="background-color: {{config.brandColor.accent}}; color: {{config.brandColor.accentForeground}}; font-family: '{{config.font.textFont}}', sans-serif;">
            🔥 Daily Streaks
          </span>
          <span class="px-3 py-1 rounded-full text-sm font-semibold"
            style="background-color: {{config.brandColor.card}}; color: {{config.brandColor.foreground}}; border: 1px solid {{config.brandColor.border}}; font-family: '{{config.font.textFont}}', sans-serif;">
            HSK 1 – 6
          </span>
        </div>
      </div>

      <!-- Attribution -->
      <data-attribution />
    </div>

    <!-- Right: visual -->
    <div class="sl-visual flex items-center justify-center overflow-hidden" style="flex: 1; background-color: {{config.brandColor.card}};">
      <img
        src="https://api-stag.qb-deck.quantumbyte.ai/common/image-generation?prompt=Mandarin%20Chinese%20flashcard%20learning%20app%20concept%2C%20clean%20digital%20cards%20with%20Chinese%20characters%2C%20soft%20red%20and%20navy%20palette%2C%20minimalist%20modern%20UI%2C%20white%20background"
        class="w-full h-full object-cover"
        alt="HSK Flash visual" />
    </div>
  </div>
</section>
